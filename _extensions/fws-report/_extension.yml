title: "FWS Report"
version: "0.3.0"
quarto-required: ">=1.4.0"

contributes:
  formats:
    pdf:
      pdf-engine: lualatex
      documentclass: article
      fontsize: 11pt
      geometry:
        - letterpaper
        - margin=1in

      include-in-header: tex/header.tex
      include-before-body: tex/frontmatter.tex

      toc: false
      number-sections: false

      colorlinks: true
      linkcolor: black
      urlcolor: black
      citecolor: black

      citeproc: true

      filters:
        - lua/pdf.lua

    docx:
      inherits: docx
      reference-doc: docx/reference.docx
      title-block-style: none

      toc: false
      number-sections: false
      citeproc: true

      filters:
        - lua/docx.lua