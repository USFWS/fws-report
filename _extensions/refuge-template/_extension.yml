title: "Alaska Refuge Report Series (PDF)"
version: "0.2.0"
quarto-required: ">=1.4.0"
contributes:
  formats:
    pdf:
      pdf-engine: lualatex
      documentclass: article
      fontsize: 11pt
      geometry:
        - letterpaper
        - margin=1in

      include-in-header: header.tex
      include-before-body: frontmatter.tex

      toc: false
      number-sections: false

      colorlinks: true
      linkcolor: black
      urlcolor: black
      citecolor: black

      citeproc: true
  
      filters:
        - filter.lua